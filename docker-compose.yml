x-build: &build
  context: .
  dockerfile: Dockerfile

x-data-volumes: &data-volumes
  - ./data/assets:/data/assets
  - ./data/projects:/data/projects
  - ./data/exports:/data/exports

services:
  studio:
    build:
      <<: *build
      target: studio-runner
    image: remotion-studio-studio:local
    init: true
    ports:
      - "${HOST_STUDIO_PORT:-3000}:3000"
    volumes: *data-volumes
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ASSETS_DIR=/data/assets
      - PROJECTS_DIR=/data/projects
      - EXPORTS_DIR=/data/exports
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:3000/api/templates > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    shm_size: '2gb'
  mcp:
    build:
      <<: *build
      target: mcp-runner
    image: remotion-studio-mcp:local
    init: true
    depends_on:
      studio:
        condition: service_healthy
    ports:
      - "${HOST_MCP_PORT:-9090}:9090"
    volumes: *data-volumes
    environment:
      - NODE_ENV=production
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9090
      - STUDIO_API_BASE_URL=http://studio:3000
      - STUDIO_PUBLIC_URL=http://localhost:${HOST_STUDIO_PORT:-3000}
      - ASSETS_DIR=/data/assets
      - PROJECTS_DIR=/data/projects
      - EXPORTS_DIR=/data/exports
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:9090/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
