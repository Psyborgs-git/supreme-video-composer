x-build: &build
  context: .
  dockerfile: Dockerfile

x-data-volumes: &data-volumes
  - ./data/assets:/data/assets
  - ./data/projects:/data/projects
  - ./data/exports:/data/exports

services:
 
  studio:
    build:
      <<: *build
      target: studio-runner
    image: remotion-studio-studio:local
    init: true
    ports:
      - "${HOST_STUDIO_PORT:-3000}:3000"
    volumes: *data-volumes
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ASSETS_DIR=/data/assets
      - PROJECTS_DIR=/data/projects
      - EXPORTS_DIR=/data/exports
      # Database - persisted SQLite file on the host via the bind mount above.
      # NOTE: the current database package uses better-sqlite3/sqlite-core, not Postgres.
      - DATABASE_URL=${DOCKER_DATABASE_URL:-file:/data/projects/studio.db}
      # Auth
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production-32chars}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Billing
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_PRO=${STRIPE_PRICE_ID_PRO:-}
      - STRIPE_PRICE_ID_TEAM=${STRIPE_PRICE_ID_TEAM:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/templates').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    shm_size: '2gb'

  mcp:
    build:
      <<: *build
      target: mcp-runner
    image: remotion-studio-mcp:local
    init: true
    depends_on:
      studio:
        condition: service_healthy
    ports:
      - "${HOST_MCP_PORT:-9090}:9090"
    volumes: *data-volumes
    environment:
      - NODE_ENV=production
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9090
      - STUDIO_API_BASE_URL=http://studio:3000
      - STUDIO_PUBLIC_URL=http://localhost:${HOST_STUDIO_PORT:-3000}
      - STUDIO_API_TOKEN=${STUDIO_API_TOKEN:-}
      - ASSETS_DIR=/data/assets
      - PROJECTS_DIR=/data/projects
      - EXPORTS_DIR=/data/exports
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

